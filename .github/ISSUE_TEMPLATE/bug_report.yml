name: Bug report
description: Report a reproducible Xenesis Desk problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps and commands.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js, npm, app version or commit, development or packaged app.
      placeholder: |
        OS:
        Node.js:
        npm:
        Xenesis Desk:
        Mode:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets, tokens, private paths, and private terminal transcript content.
      render: text

