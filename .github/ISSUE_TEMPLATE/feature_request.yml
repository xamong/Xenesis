name: Feature request
description: Propose a focused improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful shape of the change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desk UI
        - Xenesis runtime
        - MCP bridge
        - Provider integration
        - Terminal automation
        - Gowoori/XCON
        - Packaging/release
        - Documentation
    validations:
      required: true

